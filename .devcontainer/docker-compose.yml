services:
  workspace:
    build:
      context: .
      dockerfile: Dockerfile
    command: sleep infinity
    init: true
    cpus: 4
    mem_limit: 6g
    shm_size: 1g
    volumes:
      - ..:/workspaces/building-hybrid-search-apps-with-redis:cached
      - maven-cache:/home/vscode/.m2
      - npm-cache:/home/vscode/.npm
    ports:
      - "8081:8081"
    environment:
      REDIS_HOST: redis-database
      REDIS_PORT: "6379"
      REDIS_USERNAME: ${REDIS_USERNAME:-default}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    depends_on:
      redis-database:
        condition: service_healthy

  rhs-frontend:
    container_name: rhs-frontend
    hostname: rhs-frontend
    image: nginx:1.27.5
    volumes:
      - ../app/:/usr/share/nginx/html
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ../nginx/local-js.sh:/docker-entrypoint.d/local-js.sh
    environment:
      SEARCH_API: "http://localhost:8081/search"
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost/redis-movies-searcher >/dev/null 2>&1 || exit 1"]
      interval: 10s
      retries: 5
      start_period: 5s
      timeout: 5s
    command: ["/bin/sh", "-c", "chmod +x /docker-entrypoint.d/local-js.sh && /docker-entrypoint.sh nginx -g 'daemon off;'"]

  redis-database:
    container_name: redis-database
    hostname: redis-database
    image: redis:8.6.0
    volumes:
      - redis-data:/data
    environment:
      REDIS_ARGS: --save 30 1
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      retries: 5
      start_period: 5s
      timeout: 5s

  redis-insight:
    container_name: redis-insight
    hostname: redis-insight
    image: redis/redisinsight:3.0.2
    ports:
      - "5540:5540"
    environment:
      RI_REDIS_HOST: redis-database
      RI_REDIS_PORT: "6379"
    depends_on:
      redis-database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -q -O- http://redis-insight:5540/api/health | grep -q '\"status\":\"up\"'"]
      interval: 10s
      retries: 5
      start_period: 5s
      timeout: 5s

volumes:
  redis-data:
  maven-cache:
  npm-cache:
